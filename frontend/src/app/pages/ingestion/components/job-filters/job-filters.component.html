<div class="filters-bar">
  <div class="filter-item">
    <label class="filter-label">Source</label>
    <select (change)="onSourceChange($event)" class="filter-control">
      <option value="">All sources</option>
      @for (source of sources(); track source) {
        <option [value]="source" [selected]="filters().source === source">{{ source }}</option>
      }
    </select>
  </div>

  <div class="filter-item">
    <label class="filter-label">Keyword</label>
    <input
      type="text"
      [value]="filters().keyword ?? ''"
      (input)="onKeywordInput($event)"
      placeholder="Search title, description..."
      class="filter-control"
    />
  </div>

  <div class="filter-item">
    <label class="filter-label">Job location</label>
    <input
      type="text"
      [value]="filters().location ?? ''"
      (input)="onLocationInput($event)"
      placeholder="e.g. Remote, USA..."
      class="filter-control"
    />
  </div>

  <div class="filter-item">
    <label class="filter-label">Skills</label>
    <input
      type="text"
      [value]="filters().skills ?? ''"
      (input)="onSkillsInput($event)"
      placeholder="Python, React..."
      class="filter-control"
    />
  </div>

  <div class="filter-item">
    <label class="filter-label">Date From</label>
    <input
      type="date"
      [value]="filters().date_from ?? ''"
      (change)="onDateFromChange($event)"
      class="filter-control"
    />
  </div>

  <div class="filter-item">
    <label class="filter-label">Date To</label>
    <input
      type="date"
      [value]="filters().date_to ?? ''"
      (change)="onDateToChange($event)"
      class="filter-control"
    />
  </div>

  <div class="filter-item filter-item-clear">
    <button (click)="clearAll()" class="btn-clear">Clear all</button>
  </div>
</div>

<div class="location-pref-bar">
  <div class="filter-item">
    <label class="filter-label">My country</label>
    <div class="user-location-row">
      <input
        type="text"
        [value]="filters().user_location ?? ''"
        (input)="onUserLocationInput($event)"
        placeholder="e.g. Chile, USA, Spain"
        class="filter-control"
      />
      <button
        type="button"
        class="btn-detect"
        (click)="useDetectedLocation()"
        title="Detect from your browser timezone"
      >
        Use my timezone
      </button>
    </div>
  </div>
  <label class="strict-toggle">
    <input
      type="checkbox"
      [checked]="filters().strict_location ?? false"
      (change)="onStrictLocationChange($event)"
    />
    <span>Only show jobs I can apply to from my country</span>
  </label>
</div>

<div class="seniority-bar">
  <div class="seniority-group">
    <span class="filter-label">Seniority</span>
    <div class="seniority-pills">
      @for (level of ['intern', 'junior', 'mid', 'senior', 'lead']; track level) {
        <label class="seniority-pill" [class.active]="isSenioritySelected($any(level))">
          <input
            type="checkbox"
            [checked]="isSenioritySelected($any(level))"
            (change)="onSeniorityToggle($any(level), $event)"
          />
          <span>{{ level }}</span>
        </label>
      }
    </div>
  </div>

  <div class="filter-item filter-item-narrow">
    <label class="filter-label">Max years experience</label>
    <input
      type="number"
      min="0"
      max="30"
      step="1"
      [value]="filters().max_years_experience ?? ''"
      (input)="onMaxYearsInput($event)"
      placeholder="e.g. 3"
      class="filter-control"
    />
  </div>
</div>
