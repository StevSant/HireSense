<div class="dashboard-layout" [class.sidebar-open]="sidebarOpen()">
  <header class="mobile-header">
    <button class="hamburger" (click)="toggleSidebar()" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="mobile-logo">
      <h2>HireSense</h2>
    </div>
  </header>

  <div class="sidebar-backdrop" (click)="closeSidebar()"></div>

  <aside class="sidebar">
    <div class="logo">
      <h2>HireSense</h2>
      <div class="logo-sub">Career Intelligence</div>
    </div>
    <nav>
      <a routerLink="ingestion" routerLinkActive="active">
        <span class="nav-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="7 10 12 15 17 10"/>
            <line x1="12" y1="15" x2="12" y2="3"/>
          </svg>
        </span>
        <span>Ingestion</span>
      </a>
      <a routerLink="profile" routerLinkActive="active">
        <span class="nav-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <span>Profile</span>
      </a>
      <a routerLink="applications" routerLinkActive="active">
        <span class="nav-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </span>
        <span>Applications</span>
      </a>
      <a routerLink="interview" routerLinkActive="active">
        <span class="nav-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
        </span>
        <span>Interview</span>
      </a>
    </nav>
    <div class="sidebar-footer">
      <button (click)="logout()" class="logout-btn">Sign Out</button>
    </div>
  </aside>
  <main class="content">
    <router-outlet />
  </main>
</div>
