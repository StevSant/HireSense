# Dependabot keeps dependencies current across the monorepo.
# Free for public and private repos — no paid plan required.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates
version: 2
updates:
  # Backend — Python via uv (reads backend/pyproject.toml + backend/uv.lock).
  - package-ecosystem: "uv"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "area: backend"
    commit-message:
      prefix: "chore(deps)"
    groups:
      # One PR for all non-major backend bumps to cut review noise.
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Frontend — npm (reads frontend/package.json + frontend/package-lock.json).
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "area: frontend"
    commit-message:
      prefix: "chore(deps)"
    groups:
      angular:
        patterns:
          - "@angular/*"
          - "angular-eslint"
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by the workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci(deps)"

  # Container base images.
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "area: backend"
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    labels:
      - "dependencies"
      - "area: frontend"
    commit-message:
      prefix: "chore(deps)"
