<svg width="300" height="64" viewBox="0 0 300 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="HireSense">
  <defs>
    <linearGradient id="hs-teal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
  </defs>
  <!-- radar / "sense" mark: a matched signal emanating to the right -->
  <g stroke="url(#hs-teal)" stroke-width="3.5" stroke-linecap="round" fill="none">
    <path d="M14 22 A10 10 0 0 1 14 42" opacity="0.95"/>
    <path d="M14 15 A17 17 0 0 1 14 49" opacity="0.6"/>
    <path d="M14 8 A24 24 0 0 1 14 56" opacity="0.3"/>
  </g>
  <circle cx="14" cy="32" r="4.5" fill="url(#hs-teal)"/>
  <!-- wordmark -->
  <text x="52" y="43" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="32" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#0f766e">Hire</tspan><tspan fill="#14b8a6">Sense</tspan>
  </text>
</svg>
