server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Content-Security-Policy for the SPA document (served here by nginx; the
    # backend security-headers middleware only covers /api JSON responses).
    # Relaxations from a pure `default-src 'self'`, and why each is required:
    #   style-src 'unsafe-inline'  Angular injects component styles as inline
    #                              <style> tags at runtime; without CSP nonces
    #                              (not wired for this static build) inline
    #                              styles must be allowed or the UI breaks.
    #   *.googleapis / *.gstatic   Google Fonts stylesheet + font files loaded
    #                              from index.html.
    #   img-src https: data:       company logos (company-intel) come from
    #                              arbitrary external domains; data: for inline.
    #   frame-src blob:            the CV PDF preview iframe loads a blob: URL.
    # 'always' so the header rides error responses too; set at server scope so
    # both location blocks inherit it (neither defines its own add_header).
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://app:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
