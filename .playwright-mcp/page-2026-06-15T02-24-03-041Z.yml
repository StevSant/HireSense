              - paragraph [ref=e435]: We are a federal contractor or subcontractor. The law requires us to provide equal employment opportunity to qualified people with disabilities. We have a goal of having at least 7% of our workers as people with disabilities. The law says we must measure our progress towards this goal. To do this, we must ask applicants and employees if they have a disability or have ever had one. People can become disabled, so we need to ask this question at least every five years.
              - paragraph [ref=e436]:
                - text: Completing this form is voluntary, and we hope that you will choose to do so. Your answer is confidential. No one who makes hiring decisions will see it. Your decision to complete the form and your answer will not harm you in any way. If you want to learn more about the law or this form, visit the U.S. Department of Labor’s Office of Federal Contract Compliance Programs (OFCCP) website at
                - link "www.dol.gov/ofccp" [ref=e437] [cursor=pointer]:
                  - /url: https://www.dol.gov/ofccp
                - text: .
              - strong [ref=e438]: How do you know if you have a disability?
              - paragraph [ref=e439]:
                - text: A disability is a condition that substantially limits one or more of your “major life activities.” If you have or have ever had such a condition, you are a person with a disability.
                - strong [ref=e440]: "Disabilities include, but are not limited to:"
              - list [ref=e441]:
                - listitem [ref=e442]: Alcohol or other substance use disorder (not currently using drugs illegally)
                - listitem [ref=e443]: Autoimmune disorder, for example, lupus, fibromyalgia, rheumatoid arthritis, HIV/AIDS
                - listitem [ref=e444]: Blind or low vision
                - listitem [ref=e445]: Cancer (past or present)
                - listitem [ref=e446]: Cardiovascular or heart disease
                - listitem [ref=e447]: Celiac disease
                - listitem [ref=e448]: Cerebral palsy
                - listitem [ref=e449]: Deaf or serious difficulty hearing
                - listitem [ref=e450]: Diabetes
                - listitem [ref=e451]: Disfigurement, for example, disfigurement caused by burns, wounds, accidents, or congenital disorders
                - listitem [ref=e452]: Epilepsy or other seizure disorder
                - listitem [ref=e453]: Gastrointestinal disorders, for example, Crohn's Disease, irritable bowel syndrome
                - listitem [ref=e454]: Intellectual or developmental disability
                - listitem [ref=e455]: Mental health conditions, for example, depression, bipolar disorder, anxiety disorder, schizophrenia, PTSD
                - listitem [ref=e456]: Missing limbs or partially missing limbs
                - listitem [ref=e457]: Mobility impairment, benefiting from the use of a wheelchair, scooter, walker, leg brace(s) and/or other supports
                - listitem [ref=e458]: Nervous system condition, for example, migraine headaches, Parkinson’s disease, multiple sclerosis (MS)
                - listitem [ref=e459]: Neurodivergence, for example, attention-deficit/hyperactivity disorder (ADHD), autism spectrum disorder, dyslexia, dyspraxia, other learning disabilities
                - listitem [ref=e460]: Partial or complete paralysis (any cause)
                - listitem [ref=e461]: Pulmonary or respiratory conditions, for example, tuberculosis, asthma, emphysema
                - listitem [ref=e462]: Short stature (dwarfism)
                - listitem [ref=e463]: Traumatic brain injury
