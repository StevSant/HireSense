<div class="page">
  <h1>CV Optimization</h1>
  <p class="hint">
    Paste a job description below. We'll create an application, extract required skills,
    and take you to the CV tab where you can run the optimization and download a tailored PDF.
  </p>

  <div class="form">
    <div class="field">
      <label>Title</label>
      <input [ngModel]="title()" (ngModelChange)="title.set($event)" placeholder="e.g. Senior Backend Engineer" />
    </div>
    <div class="field">
      <label>Company</label>
      <input [ngModel]="company()" (ngModelChange)="company.set($event)" placeholder="e.g. Acme Corp" />
    </div>
    <div class="field">
      <label>Job description</label>
      <textarea
        rows="10"
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        placeholder="Paste the full job description here..."
      ></textarea>
    </div>
    @if (error()) {
      <div class="alert alert-error">{{ error() }}</div>
    }
    <button class="btn-primary" (click)="submit()" [disabled]="saving()">
      @if (saving()) { Creating... } @else { Continue to CV optimization → }
    </button>
  </div>
</div>
