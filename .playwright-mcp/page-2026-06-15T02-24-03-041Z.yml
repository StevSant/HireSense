          - generic [ref=e18]:
            - paragraph [ref=e19]: GitLab is the intelligent orchestration platform for DevSecOps. GitLab enables organizations to increase developer productivity, improve operational efficiency, reduce security and compliance risk, and accelerate digital transformation. More than 50 million registered users and more than 50% of the Fortune 100* trust GitLab to ship better, more secure software faster.
            - paragraph [ref=e20]:
              - text: "The same principles built into our products are reflected in how our team works: we embrace AI as a core productivity multiplier, with all team members expected to incorporate AI into their daily workflows to drive efficiency, innovation, and impact. GitLab is where careers accelerate, innovation flourishes, and every voice is valued. Our high-performance culture is driven by our values and continuous knowledge exchange, enabling our team members to reach their full potential while collaborating with industry leaders to solve complex problems."
              - link "Co-create the future with us" [ref=e21] [cursor=pointer]:
                - /url: https://www.youtube.com/watch?v=OuZIb5zszQI
              - text: as we build technology that transforms how the world develops software.
            - paragraph [ref=e22]:
              - text: "*"
              - emphasis [ref=e23]: Fortune 500® is a registered trademark of Fortune Media IP Limited, used under license. Claim based on GitLab data. Fortune 100 refers to the top 20% ranked companies in the 2025 Fortune 500 list, published in June 2025. Fortune and Fortune Media IP Limited are not affiliated with, and do not endorse products or services of GitLab.
          - generic [ref=e24]:
            - heading "An overview of this role" [level=2] [ref=e25]:
              - strong [ref=e26]: An overview of this role
            - paragraph [ref=e27]: As an AI Engineer at GitLab, you'll help build the foundation for GitLab's transformation into an AI-first company. Reporting to the Director, Enterprise AI, you'll be a hands-on technical leader responsible for delivering internal AI-powered solutions that drive measurable business outcomes.
            - paragraph [ref=e28]: "Building fast matters, but it's not enough on its own. This role starts with understanding the real problem: mapping how work moves across teams, tools, and handoffs, identifying the true constraint, and validating whether AI is the right solution before you begin development. From there, you'll take ownership from discovery through deployment, combining strong engineering skills with systems thinking and business understanding."
            - paragraph [ref=e29]: Your initial focus will span Sales, Marketing, and Customer Support, where you will embed AI solutions into key systems and workflows. This role offers the opportunity to shape how GitLab team members work, improve flow across the organization, and help advance our mission in a remote, asynchronous, and values-driven environment.
            - heading "What you'll do" [level=2] [ref=e30]:
              - strong [ref=e31]: What you'll do
            - list [ref=e32]:
              - listitem [ref=e33]: Diagnose business problems before building solutions. Map workflows, identify constraints, and confirm whether AI is the right intervention. Be prepared to say "this doesn't need AI" when that's the honest answer.
              - listitem [ref=e34]: Own AI initiatives end-to-end, from stakeholder discovery and technical design through implementation, deployment, and iteration.
              - listitem [ref=e35]: Design, develop, and ship AI-powered solutions quickly, delivering working prototypes in days, not months, with a focus on practical outcomes and measurable business value.
              - listitem [ref=e36]: Improve organizational flow by building solutions that reduce bottlenecks, shorten lead times, and increase throughput. Measure success using flow metrics alongside adoption and ROI.
              - listitem [ref=e37]: Integrate AI capabilities into existing systems and workflows using APIs, orchestration tools, and modern AI platforms, including GitLab Duo Agent Platform, where appropriate. The right tool wins, whether that's custom code, a platform, or a well-crafted prompt.
              - listitem [ref=e38]: "Be Customer Zero: leverage and showcase GitLab's AI offerings wherever possible, feeding real-world usage insights back to R&D."
              - listitem [ref=e39]: Partner closely with stakeholders across functions to understand the real constraints. Ask the right questions, bridge technical and non-technical perspectives, and align on outcomes before jumping to solutions.
              - listitem [ref=e40]: Define and track success through business metrics, flow metrics, and feedback loops that make performance visible and actionable.
              - listitem [ref=e41]: Contribute to technical direction by evaluating tools, documenting patterns, and creating reusable foundations that help the team scale its impact.
            - heading "What you'll bring" [level=2] [ref=e42]:
              - strong [ref=e43]: What you'll bring
            - list [ref=e44]:
              - listitem [ref=e45]:
                - strong [ref=e46]: A Technologist at Heart -
                - text: Genuinely invested in technology, the foundational and the cutting-edge in equal measure. You're as energised by a well-designed API integration as you are by the latest foundation model release. You reach for the simplest solution that solves the problem well, rather than forcing new technology when proven approaches would do. AI is a powerful part of your toolkit, but it sits on top of solid engineering fundamentals, not in place of them.
              - listitem [ref=e47]:
                - strong [ref=e48]: Competent, Confident Coding Skills -
                - text: You can build working solutions end-to-end, write clean and maintainable code, and debug effectively. Whether your skills were honed in a traditional engineering role, through building automations, or shipping side projects, what matters is that you can deliver production-quality work independently.
              - listitem [ref=e49]:
                - strong [ref=e50]: AI
                - strong [ref=e51]: "& LLM"
                - strong [ref=e52]: Technical Depth -
                - text: "Strong proficiency in at least one modern scripting language (Python, JavaScript/TypeScript, or similar) and a solid understanding of REST APIs, GraphQL, and integration patterns. Deep, practical experience with modern AI technologies, specifically: Prompt engineering as a core discipline: designing effective system prompts, managing context windows, structuring multi-turn interactions, evaluating output quality, and iterating systematically on prompt design."
              - listitem [ref=e53]:
                - strong [ref=e54]: "Model selection and cost-performance trade-offs:"
                - text: understanding when a smaller fine-tuned model outperforms a general-purpose large one, when RAG is the right architecture versus expanding the context window, and how to make principled decisions about capability versus cost.
              - listitem [ref=e55]:
                - strong [ref=e56]: "Agentic architecture patterns:"
                - text: "tool use, multi-agent orchestration, human-in-the-loop designs, guardrails, evaluation frameworks, and production-grade reliability patterns.Practical fluency across the LLM ecosystem: hands-on experience with models from Anthropic, OpenAI, open-source alternatives, and the judgment to know which to reach for and when."
              - listitem [ref=e57]:
                - strong [ref=e58]: AI Safety & Risk Awareness -
                - text: You think critically about how the solutions you build could be exploited, misused, or produce unintended consequences. You know how to design appropriate guardrails (input validation, output filtering, access controls, prompt injection defences, and data leakage prevention) and you treat these as first-class engineering concerns.
              - listitem [ref=e59]:
                - strong [ref=e60]: Systems Thinking & Diagnostic Rigour -
                - text: The ability to look at a complex process and see the constraint. Comfortable mapping how work flows end-to-end, identifying bottlenecks, and tracing problems to root causes before proposing solutions. You instinctively ask "what's actually blocking flow here?" before asking "what model should I use?"
              - listitem [ref=e61]:
                - strong [ref=e62]: Business System Expertise -
                - text: Familiarity with the landscape of enterprise business systems, CRM (Salesforce), marketing automation (Marketo), support platforms (Zendesk), integration and orchestration tools (Workato), AI platforms (Relevance AI), and enterprise search and knowledge tools (Glean). You don't need deep experience with all of these, but to understand what they do, how they fit together, and be willing to build with and across them. A strong understanding of enterprise data models and workflows is essential.
              - listitem [ref=e63]:
                - strong [ref=e64]: Broad Functional Understanding -
                - text: Ability to have meaningful conversations with stakeholders across diverse domains and quickly understand their unique needs.
              - listitem [ref=e65]:
                - strong [ref=e66]: End-to-End Ownership -
                - text: Track record of owning complex initiatives from discovery through delivery. Comfortable operating with ambiguity and driving to measurable outcomes independently.
              - listitem [ref=e67]:
                - strong [ref=e68]: Product Mindset -
                - text: Ability to scope MVPs, prioritise ruthlessly, and deliver iteratively. In addition, consider adoption, user experience, and business outcomes.
            - paragraph [ref=e69]
            - paragraph [ref=e70]:
              - strong [ref=e71]: Preferred requirements
            - list [ref=e72]:
              - listitem [ref=e73]: Experience with GitLab platform and CI/CD workflows
              - listitem [ref=e74]: Background in consulting, solutions engineering, or customer-facing technical roles
              - listitem [ref=e75]: Familiarity with value stream mapping, flow metrics, or Theory of Constraints thinking
              - listitem [ref=e76]: Experience with low-code/no-code orchestration tools (n8n, Make, Workato) alongside custom development
              - listitem [ref=e77]: Previous startup or high-growth company experience
              - listitem [ref=e78]: Experience mentoring or leading technical projects with junior engineers
            - heading "About the team" [level=2] [ref=e79]:
              - strong [ref=e80]: About the team
            - paragraph [ref=e81]: You will join the Enterprise Technology & AI team. We're the backbone of the organisation, driving transformation in how GitLab team members make decisions, operate at scale, and deliver results for our customers.
            - paragraph [ref=e82]: We believe the best AI solutions start with understanding the system, not the technology. We value people who think in constraints and flow, who build with conviction, and who never stop learning. We work in an all-remote, asynchronous setting, guided by GitLab's values of collaboration, results, efficiency, diversity, inclusion and belonging, iteration, and transparency.
          - generic [ref=e84]:
            - paragraph [ref=e88]:
              - emphasis [ref=e89]:
                - text: The base salary range for this role’s listed level is currently for residents of the United States only. This range is intended to reflect the role's base salary rate in locations throughout the US. Grade level and salary ranges are determined through interviews and a review of education, experience, knowledge, skills, abilities of the applicant, equity with other team members, alignment with market data, and geographic location. The base salary range does not include any bonuses, equity, or benefits. See more information on our
                - link "benefits" [ref=e90] [cursor=pointer]:
                  - /url: https://about.gitlab.com/handbook/total-rewards/benefits/general-and-entity-benefits/
                - text: and
                - link "equity" [ref=e91] [cursor=pointer]:
                  - /url: https://about.gitlab.com/handbook/stock-options/
                - text: . Sales roles are also eligible for incentive pay targeted at up to 100% of the offered base salary.
