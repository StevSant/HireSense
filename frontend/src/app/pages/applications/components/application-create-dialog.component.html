<div class="overlay" tabindex="-1" (click)="onOverlay($event)" (keydown.escape)="onEscape()">
  <div class="dialog" role="dialog" aria-modal="true" aria-labelledby="create-dialog-title">
    <div class="dialog-header">
      <h2 id="create-dialog-title">New application</h2>
      <button class="btn-close" (click)="closed.emit()" aria-label="Close dialog">✕</button>
    </div>
    <p class="hint">
      Paste a job description below. Required skills will be extracted automatically.
    </p>

    <div class="field">
      <label for="create-title">Title</label>
      <input
        id="create-title"
        maxlength="255"
        [ngModel]="title()"
        (ngModelChange)="title.set($event)"
        placeholder="e.g. Senior Backend Engineer"
      />
    </div>
    <div class="field">
      <label for="create-company">Company</label>
      <input
        id="create-company"
        maxlength="255"
        [ngModel]="company()"
        (ngModelChange)="company.set($event)"
        placeholder="e.g. Acme Corp"
      />
    </div>
    <div class="field">
      <label for="create-url">URL (optional)</label>
      <input
        id="create-url"
        maxlength="2048"
        [ngModel]="url()"
        (ngModelChange)="url.set($event)"
        placeholder="https://..."
      />
    </div>
    <div class="field">
      <label for="create-description">Job description</label>
      <textarea
        id="create-description"
        rows="10"
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        placeholder="Paste the full job description here..."
      ></textarea>
    </div>

    <details class="listing-metadata">
      <summary>Optional listing details</summary>
      <p class="hint">These values appear in the application pipeline.</p>
      <div class="metadata-grid">
        <div class="field">
          <label for="create-location">Location</label>
          <input
            id="create-location"
            [ngModel]="location()"
            (ngModelChange)="location.set($event)"
            placeholder="e.g. Quito, Ecuador"
          />
        </div>
        <div class="field">
          <label for="create-work-mode">Work mode</label>
          <select
            id="create-work-mode"
            [ngModel]="remoteModality()"
            (ngModelChange)="remoteModality.set($event)"
          >
            <option value="">Not specified</option>
            <option value="remote">Remote</option>
            <option value="hybrid">Hybrid</option>
            <option value="on_site">On-site</option>
          </select>
        </div>
        <div class="field">
          <label for="create-salary">Salary range</label>
          <input
            id="create-salary"
            [ngModel]="salaryRange()"
            (ngModelChange)="salaryRange.set($event)"
            placeholder="e.g. USD 1,500-2,000/mo"
          />
        </div>
        <div class="field">
          <label for="create-source">Source</label>
          <input
            id="create-source"
            maxlength="100"
            [ngModel]="source()"
            (ngModelChange)="source.set($event)"
            placeholder="e.g. Referral or LinkedIn"
          />
        </div>
        <div class="field">
          <label for="create-posted-date">Posted date</label>
          <input
            id="create-posted-date"
            type="date"
            [ngModel]="postedDate()"
            (ngModelChange)="postedDate.set($event)"
          />
        </div>
      </div>
    </details>

    @if (error()) {
      <div class="alert alert-error">{{ error() }}</div>
    }

    <div class="actions">
      <button class="btn-secondary" (click)="closed.emit()">Cancel</button>
      <button class="btn-primary" (click)="submit()" [disabled]="saving()">
        @if (saving()) {
          Creating...
        } @else {
          Create application
        }
      </button>
    </div>
  </div>
</div>
