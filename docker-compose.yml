services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: hiresense
      POSTGRES_PASSWORD: hiresense
      POSTGRES_DB: hiresense
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hiresense"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  otel-lgtm:
    image: grafana/otel-lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - lgtm:/data
      # HireSense Grafana dashboards (provisioned, read-only mounts).
      - ./observability/grafana/provisioning/dashboards/hiresense.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/hiresense.yaml:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards/hiresense:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  app:
    build: ./backend
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: ./backend/.env
    environment:
      # Compose is a real deployment: fail loudly on missing config.
      APP_MODE: production
      # In-network overrides: .env is host-oriented (localhost); inside the
      # compose network the app must address services by name.
      DATABASE_URL: postgresql+asyncpg://hiresense:hiresense@db:5432/hiresense
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4317
      LOG_FORMAT: json
      # Self-drive the recurring pipeline in the containerized deployment.
      SCHEDULER_ENABLED: "true"
    depends_on:
      db:
        condition: service_healthy
      otel-lgtm:
        condition: service_started
    volumes:
      - ./cvs:/app/cvs
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      - app
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  pgdata:
  lgtm:
