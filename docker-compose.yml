services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      # Credentials come from the compose env (shell or the repo-root .env — see
      # .env.example). POSTGRES_PASSWORD has no committed default: `:?` fails the
      # command loudly if it is unset, so a production-labeled stack never ships
      # guessable static credentials.
      POSTGRES_USER: ${POSTGRES_USER:-hiresense}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (copy .env.example to .env and set it)}
      POSTGRES_DB: ${POSTGRES_DB:-hiresense}
    ports:
      # Bound to loopback by default: the app reaches the DB over the compose
      # network (db:5432), so the host publish is only for local tooling (psql,
      # the opt-in pgvector tests on localhost:5432). Override DB_HOST_PORT with
      # e.g. 0.0.0.0:5432 only if external access is genuinely required.
      - "${DB_HOST_PORT:-127.0.0.1:5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-hiresense}"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G

  otel-lgtm:
    image: grafana/otel-lgtm
    ports:
      - "3000:3000"   # Grafana UI
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    volumes:
      - lgtm:/data
      # HireSense Grafana dashboards (provisioned, read-only mounts).
      - ./observability/grafana/provisioning/dashboards/hiresense.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/hiresense.yaml:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards/hiresense:ro
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  app:
    build: ./backend
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file: ./backend/.env
    environment:
      # Compose is a real deployment: fail loudly on missing config.
      APP_MODE: production
      # In-network overrides: .env is host-oriented (localhost); inside the
      # compose network the app must address services by name. Credentials reuse
      # the same POSTGRES_* compose vars as the db service so they stay in sync.
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-hiresense}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (copy .env.example to .env and set it)}@db:5432/${POSTGRES_DB:-hiresense}
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-lgtm:4317
      # Compose ships telemetry over plaintext gRPC inside the compose network
      # (otel-lgtm is a sibling service). The code default is now secure (False),
      # so opt into insecure explicitly here.
      OTEL_EXPORTER_INSECURE: "true"
      LOG_FORMAT: json
      # Self-drive the recurring pipeline in the containerized deployment.
      SCHEDULER_ENABLED: "true"
      # `environment:` overrides `env_file`, so this wins over backend/.env's
      # HF_HUB_OFFLINE=1 (correct for local dev with a warm cache). A fresh
      # container has no baked model and no HF cache volume until first run,
      # so it must be allowed to download the sentence-transformers model on
      # first use — otherwise semantic scoring fails at first request.
      HF_HUB_OFFLINE: "0"
    depends_on:
      db:
        condition: service_healthy
      otel-lgtm:
        condition: service_started
    volumes:
      - ./cvs:/app/cvs
      - hf-cache:/root/.cache/huggingface
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G

  frontend:
    build: ./frontend
    ports:
      - "${FRONTEND_PORT:-4200}:80"
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  pgdata:
  lgtm:
  hf-cache:
