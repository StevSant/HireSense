<div class="dashboard-layout" [class.sidebar-open]="sidebarOpen()">
  <header class="mobile-header">
    <button class="hamburger" (click)="toggleSidebar()" aria-label="Toggle navigation">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div class="mobile-logo">
      <h2>HireSense</h2>
    </div>
  </header>

  <div
    class="sidebar-backdrop"
    tabindex="-1"
    aria-hidden="true"
    (click)="closeSidebar()"
    (keydown.escape)="closeSidebar()"
  ></div>

  <aside class="sidebar">
    <div class="logo">
      <h2>HireSense</h2>
      <div class="logo-sub">Career Intelligence</div>
    </div>
    <nav aria-label="Main navigation">
      <a [routerLink]="['ingestion']" [class.active]="activeHub() === 'discover'">
        <span class="nav-icon" aria-hidden="true">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="7 10 12 15 17 10" />
            <line x1="12" y1="15" x2="12" y2="3" />
          </svg>
        </span>
        <span>Discover</span>
      </a>
      <a [routerLink]="['applications']" [class.active]="activeHub() === 'pipeline'">
        <span class="nav-icon" aria-hidden="true">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2" />
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
          </svg>
        </span>
        <span>Pipeline</span>
      </a>
      <a [routerLink]="['analytics']" [class.active]="activeHub() === 'insights'">
        <span class="nav-icon" aria-hidden="true">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="18" y1="20" x2="18" y2="10" />
            <line x1="12" y1="20" x2="12" y2="4" />
            <line x1="6" y1="20" x2="6" y2="14" />
          </svg>
        </span>
        <span>Insights</span>
      </a>
      <a [routerLink]="['profile']" [class.active]="activeHub() === 'profile'">
        <span class="nav-icon" aria-hidden="true">
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.75"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
            <circle cx="12" cy="7" r="4" />
          </svg>
        </span>
        <span>Profile</span>
      </a>
      @if (!demoMode) {
        <a [routerLink]="['admin/llm-settings']" [class.active]="activeHub() === 'admin'">
          <span class="nav-icon" aria-hidden="true">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33 1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          </span>
          <span>Admin</span>
        </a>
      }
    </nav>
    <div class="sidebar-footer">
      <button (click)="logout()" class="logout-btn">Sign Out</button>
    </div>
  </aside>
  <main class="content">
    @if (demoMode) {
      <aside class="demo-banner" data-testid="demo-banner" aria-label="Public demo status">
        <div class="demo-banner__status">
          <span class="demo-banner__label">Demo</span>
          <span>Synthetic data</span>
          <span aria-hidden="true">·</span>
          <span>Read-only</span>
        </div>
        <p>No account or backend is connected. Explore a prepared candidate journey.</p>
        <a href="https://github.com/StevSant/HireSense" target="_blank" rel="noopener noreferrer">
          View source on GitHub
        </a>
      </aside>
    }
    @if (hubTabs(); as hub) {
      <app-hub-tabs [hub]="hub" />
    }
    <router-outlet />
  </main>
</div>
