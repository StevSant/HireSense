<div class="feedback-controls" [class.compact]="compact()">
  @for (c of controls; track c.kind) {
    <button
      type="button"
      class="fb-btn"
      [class.active]="lastSent() === c.kind"
      [disabled]="pending() !== null"
      [attr.aria-label]="c.label"
      [title]="c.label"
      (click)="submit(c.kind); $event.stopPropagation()"
    >
      <svg
        class="fb-icon"
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.75"
        stroke-linecap="round"
        stroke-linejoin="round"
        aria-hidden="true"
        focusable="false"
      >
        @switch (c.icon) {
          @case ('thumb-up') {
            <path d="M7 11v9H4a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1z" />
            <path
              d="M7 11l4.5-7a2 2 0 0 1 3 1.7V9h4.6a2 2 0 0 1 2 2.4l-1.4 6.5a2 2 0 0 1-2 1.6H7"
            />
          }
          @case ('thumb-down') {
            <path d="M17 13V4h3a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1z" />
            <path
              d="M17 13l-4.5 7a2 2 0 0 1-3-1.7V15H4.9a2 2 0 0 1-2-2.4l1.4-6.5a2 2 0 0 1 2-1.6H17"
            />
          }
          @case ('ban') {
            <circle cx="12" cy="12" r="9" />
            <line x1="5.6" y1="5.6" x2="18.4" y2="18.4" />
          }
          @case ('sparkle') {
            <path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z" />
            <path d="M19 16l.7 1.8L21.5 18.5 19.7 19.2 19 21l-.7-1.8L16.5 18.5l1.8-.7z" />
          }
        }
      </svg>
      @if (!compact()) {
        <span class="fb-label">{{ c.label }}</span>
      }
    </button>
  }
  @if (failed()) {
    <span class="fb-error" role="alert">Couldn't save — tap again</span>
  }
</div>
